version: 2
updates:
  # Software Composition Analysis: keep npm dependencies patched
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/test tooling updates into a single PR
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"
      - "security"

  # Keep GitHub Actions pinned and patched
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
