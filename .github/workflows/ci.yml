name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token
permissions:
  contents: read

jobs:
  build:
    name: Lint, Audit & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint + eslint-plugin-security / SAST)
        run: npm run lint

      - name: Test
        run: npm test -- --watchAll=false
        env:
          CI: "true"

      - name: Dependency audit (SCA, high severity)
        # Build toolchain (react-scripts) carries dev-only advisories that
        # cannot be fixed without a breaking downgrade, so gate on shipped deps.
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          CI: "true"
